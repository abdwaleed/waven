name: waven
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - setuptools>=61
  - wheel
  - numexpr=2.8.4

  # Core numerical/scientific stack. NumPy is pinned below 2.0 because
  # suite2p/facemap/numba-style neuroscience tools often do not support NumPy 2.
  - numpy=1.26
  - numba
  - scipy
  - pandas
  - scikit-image
  - scikit-learn
  - statsmodels
  - matplotlib
  - seaborn
  - tifffile
  - imageio
  - pywavelets

  # Computer vision, array storage, and compression.
  - opencv
  - zarr
  - numcodecs
  - tqdm

  # Machine learning/model fitting.
  - pytorch=2.0.1
  - pytorch-cuda=11.8
  - tensorly

  # GUI and notebook/dev convenience.
  - tk
  - ipython
  - ipykernel

  # Pip-only or more consistently available via pip.
  - pip:
      - suite2p
