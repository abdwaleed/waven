name: waven
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - setuptools>=61
  - wheel
  - numexpr=2.8.4
  - psutil

  # Core numerical/scientific stack. 
  # NumPy is pinned below 2.0 for suite2p/numba compatibility.
  - numpy=1.26
  - numba
  - scipy
  - pandas
  - scikit-image
  - scikit-learn
  - statsmodels
  - matplotlib
  - seaborn
  - tifffile
  - imageio
  - pywavelets
  - tqdm

  # Computer vision, array storage, and compression.
  - opencv
  - zarr
  - numcodecs

  # Machine learning/model fitting.
  - pytorch>=2.1.2
  - pytorch-cuda=12.1
  - tensorly

  # GUI and notebook/dev convenience.
  - tk
  - customtkinter>=5.2.0
  - ipython
  - ipykernel

  # Pip-only or more consistently available via pip.
  - pip:
      - suite2p